name: gasport

on:
  workflow_dispatch

jobs:
  export:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: croconut/godot-multi-builder@v1
        id: builds
        with:
          names: "Android"

      - uses: actions/upload-artifact@v4
        with:
          name: my-builds
          path: builds/builds.zip